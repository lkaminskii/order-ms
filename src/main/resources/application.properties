spring.application.name=order-ms

server.port=8080
server.servlet.context-path=/api/v1

spring.datasource.url=jdbc:postgresql://localhost:5432/orderdb
spring.datasource.username=postgres
spring.datasource.password=453801
spring.datasource.driver-class-name=org.postgresql.Driver  

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest  
spring.rabbitmq.connection-timeout=5000

rabbitmq.queue.order.created=order.created.queue
rabbitmq.exchange.order=order.exchange
rabbitmq.routing.key.order.created=order.created

aws.endpoint=http://localhost:4566 
aws.region=us-east-1
aws.access-key-id=accesskey
aws.secret-access-key=secretkey
aws.sqs.order-created-queue=order-created-queue
aws.sqs.order-processed-queue=order-processed-queue

logging.level.com.order=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/order-service.log

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


